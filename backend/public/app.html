<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>يلا نسوالف</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Cairo,sans-serif}
body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center}
.container{width:100%;max-width:420px;height:100vh;background:#fff;display:flex;flex-direction:column;box-shadow:0 0 20px rgba(0,0,0,.1)}
.hidden{display:none!important}
.header{background:#6C63FF;color:#fff;padding:15px 20px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px}
.btn{background:#6C63FF;color:#fff;border:none;padding:10px 20px;border-radius:25px;font-size:16px;cursor:pointer}
.btn:hover{opacity:.9}
input{padding:10px;border:1px solid #ddd;border-radius:10px;font-size:16px;outline:none;width:100%}
input:focus{border-color:#6C63FF}
.card{margin:10px;padding:15px;background:#f8f9fa;border-radius:12px;cursor:pointer}
.card:hover{background:#e8e9ff}
.chat-msg{margin:5px 15px;padding:8px 12px;border-radius:12px;max-width:80%}
.chat-msg.sent{background:#6C63FF;color:#fff;align-self:flex-end}
.chat-msg.received{background:#f0f0f0;align-self:flex-start}
#messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:5px}
#chatInput{display:flex;padding:10px;gap:10px;border-top:1px solid #ddd}
#chatInput input{flex:1}
.login-box{padding:40px 20px;display:flex;flex-direction:column;gap:15px;align-items:center;justify-content:center;flex:1}
.login-box h2{color:#333;margin-bottom:20px}
.login-box input{text-align:center}
.room-list{flex:1;overflow-y:auto;padding:10px}
.room-item{display:flex;justify-content:space-between;align-items:center}
.room-info{flex:1}
.room-name{font-weight:bold;color:#333}
.room-count{font-size:12px;color:#999}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:5px}
.tabs{display:flex;background:#f0f0f0}
.tab{flex:1;text-align:center;padding:12px;cursor:pointer;font-weight:bold;color:#666}
.tab.active{color:#6C63FF;border-bottom:2px solid #6C63FF;background:#fff}
.tab-content{flex:1;display:none}
.tab-content.active{display:block}
#profileContent{padding:20px;text-align:center}
.avatar{width:80px;height:80px;border-radius:50%;background:#6C63FF;display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px;margin:0 auto 15px}
</style>
</head>
<body>
<div class="container" id="app">
<div class="header"><h1>يلا نسوالف</h1><button class="btn" id="logoutBtn" style="display:none;background:#ff4757;padding:5px 15px">خروج</button></div>

<div id="loginView" class="login-box">
<h2>تسجيل الدخول</h2>
<input type="tel" id="phoneInput" placeholder="رقم الهاتف" maxlength="15">
<button class="btn" id="sendOtpBtn" style="width:100%">إرسال رمز التحقق</button>
<div id="otpSection" class="hidden" style="width:100%;display:flex;flex-direction:column;gap:10px">
<input type="text" id="otpInput" placeholder="رمز التحقق" maxlength="6">
<button class="btn" id="verifyOtpBtn" style="width:100%;background:#28a745">تأكيد</button>
</div>
<div id="loginError" style="color:red;font-size:14px;text-align:center"></div>
</div>

<div id="mainView" class="hidden" style="flex:1;display:flex;flex-direction:column">
<div class="tabs">
<div class="tab active" data-tab="rooms">الغرف</div>
<div class="tab" data-tab="chat">المحادثة</div>
<div class="tab" data-tab="profile">حسابي</div>
</div>
<div class="tab-content active" id="roomsContent">
<div style="padding:10px">
<input type="text" id="roomSearch" placeholder="بحث عن غرفة...">
</div>
<div class="room-list" id="roomList"></div>
</div>
<div class="tab-content" id="chatContent" style="display:flex;flex-direction:column;flex:1">
<div class="hidden" id="noRoom" style="flex:1;display:flex;align-items:center;justify-content:center;color:#999">اختر غرفة للدردشة</div>
<div id="messages"></div>
<div id="chatInput"><input type="text" id="messageInput" placeholder="اكتب رسالة..."><button class="btn" id="sendBtn">إرسال</button></div>
</div>
<div class="tab-content" id="profileContent">
<div class="avatar" id="avatarText">👤</div>
<h3 id="profileName">المستخدم</h3>
<p style="color:#666" id="profileBalance">الرصيد: 0</p>
<button class="btn" id="createRoomBtn" style="margin-top:20px">إنشاء غرفة جديدة</button>
</div>
</div>
</div>

<script>
const API = window.location.origin;
let token = localStorage.getItem('token');
let currentUser = null;
let currentRoom = null;
let socket = null;

function showLoginError(msg) { document.getElementById('loginError').textContent = msg; }

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(`${API}${path}`, { ...opts, headers });
  if (!res.ok) throw new Error((await res.json()).message || 'Error');
  return res.json();
}

document.getElementById('sendOtpBtn').onclick = async () => {
  const phone = document.getElementById('phoneInput').value;
  if (!phone) return showLoginError('الرجاء إدخال رقم الهاتف');
  try {
    await api('/api/auth/send-otp', { method:'POST', body:JSON.stringify({phone,countryCode:'+964'}) });
    document.getElementById('otpSection').classList.remove('hidden');
    showLoginError('تم إرسال الرمز');
  } catch(e) { showLoginError(e.message); }
};

document.getElementById('verifyOtpBtn').onclick = async () => {
  const phone = document.getElementById('phoneInput').value;
  const otp = document.getElementById('otpInput').value;
  try {
    const data = await api('/api/auth/verify-otp', { method:'POST', body:JSON.stringify({phone,otp,username:'user_'+Date.now(),countryCode:'+964'}) });
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('token', token);
    showApp();
  } catch(e) { showLoginError(e.message); }
};

function showApp() {
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('mainView').classList.remove('hidden');
  document.getElementById('logoutBtn').style.display='block';
  document.getElementById('profileName').textContent = currentUser.displayName || currentUser.username;
  document.getElementById('profileBalance').textContent = `الرصيد: ${currentUser.balance}`;
  document.getElementById('avatarText').textContent = (currentUser.displayName || 'U')[0].toUpperCase();
  loadRooms();
  connectSocket();
}

document.getElementById('logoutBtn').onclick = () => {
  localStorage.removeItem('token');
  location.reload();
};

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab+'Content').classList.add('active');
  };
});

// Rooms
async function loadRooms() {
  try {
    const data = await api('/api/rooms/');
    const list = document.getElementById('roomList');
    list.innerHTML = '';
    (data.rooms || []).forEach(room => {
      const div = document.createElement('div');
      div.className = 'card room-item';
      div.innerHTML = '<div class="room-info"><div class="room-name">'+room.name+'</div><div class="room-count">'+((room.members||[]).length)+' عضو</div></div><span style="color:#6C63FF">انضمام</span>';
      div.onclick = () => joinRoom(room._id);
      list.appendChild(div);
    });
  } catch(e) { console.error(e); }
}

async function joinRoom(roomId) {
  currentRoom = roomId;
  document.querySelector('[data-tab="chat"]').click();
  document.getElementById('noRoom').classList.add('hidden');
  document.getElementById('messages').innerHTML = '';
  loadMessages(roomId);
  if (socket) socket.emit('join-room', { roomId });
}

async function loadMessages(roomId) {
  try {
    const data = await api(`/api/messages/${roomId}?limit=50`);
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    (data.messages || []).forEach(msg => {
      const div = document.createElement('div');
      const isSent = msg.sender && msg.sender._id === currentUser._id;
      div.className = 'chat-msg ' + (isSent ? 'sent' : 'received');
      div.textContent = (msg.sender ? msg.sender.displayName + ': ' : '') + msg.content;
      msgs.appendChild(div);
    });
    msgs.scrollTop = msgs.scrollHeight;
  } catch(e) { console.error(e); }
}

document.getElementById('sendBtn').onclick = async () => {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text || !currentRoom) return;
  input.value = '';
  if (socket) {
    socket.emit('send-message', { roomId: currentRoom, content: text });
  }
};

document.getElementById('messageInput').onkeypress = (e) => {
  if (e.key === 'Enter') document.getElementById('sendBtn').click();
};

function connectSocket() {
  if (socket) socket.close();
  socket = io(API, { auth: { token } });
  socket.on('connect', () => console.log('Socket connected'));
  socket.on('new-message', (msg) => {
    if (msg.room === currentRoom) {
      const div = document.createElement('div');
      const isSent = msg.sender && msg.sender._id === currentUser._id;
      div.className = 'chat-msg ' + (isSent ? 'sent' : 'received');
      div.textContent = (msg.sender ? msg.sender.displayName + ': ' : '') + msg.content;
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
  });
}

document.getElementById('createRoomBtn').onclick = () => {
  const name = prompt('اسم الغرفة:');
  if (name) {
    api('/api/rooms/', { method:'POST', body:JSON.stringify({name}) }).then(() => loadRooms());
  }
};

document.getElementById('roomSearch').oninput = async (e) => {
  const q = e.target.value;
  if (q.length > 0) {
    try {
      const data = await api('/api/rooms/?search='+q);
      const list = document.getElementById('roomList');
      list.innerHTML = '';
      (data.rooms || []).forEach(room => {
        const div = document.createElement('div');
        div.className = 'card room-item';
        div.innerHTML = '<div class="room-info"><div class="room-name">'+room.name+'</div></div><span style="color:#6C63FF">انضمام</span>';
        div.onclick = () => joinRoom(room._id);
        list.appendChild(div);
      });
    } catch(e) {}
  } else loadRooms();
};

// Auto-login
if (token) {
  api('/api/auth/me').then(user => {
    currentUser = user;
    showApp();
  }).catch(() => { localStorage.removeItem('token'); });
}
</script>
</body>
</html>
